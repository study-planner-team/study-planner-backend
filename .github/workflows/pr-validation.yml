name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore StudyPlannerAPI/StudyPlannerAPI.csproj

      - name: Build
        run: dotnet build StudyPlannerAPI/StudyPlannerAPI.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test StudyPlannerTests/StudyPlannerTests.csproj --configuration Release --no-build --verbosity normal